; ============================================================
; BaMe Battery Meter — PlatformIO config
; ============================================================
;
; Quickstart for a new user:
;   pio run -t upload                      # builds the default env (see below)
;   pio run -e nano-load-4s -t upload      # picks a specific env
;   pio run                                # build only, no upload
;
; The default env below targets the most common install: an Arduino Nano
; (dev mode), a 4-cell LFP pack (12 V), with the shunt on the battery bus
; (every load AND charge passes through the INA226). Change `default_envs`
; below if your install is different — or just always pass `-e <env>`.
;
; Build flags exposed to your firmware (override per env or via -D on cli):
;
;   BAME_DEV          : 1 = dev build (no sleep, minimal menu, more debug),
;                       0 = full prod build with sleep + extended menu
;   BAME_DEBUG        : 1 = enable Serial.print debug spam, 0 = quiet
;   BAME_CELLS        : LFP cell count in series (e.g. 4 for 12 V, 8 for 24 V)
;                       — physical install decision, fixed at flash time
;   BAME_WIRING_BUS   : 1 = BUS  install: every load AND charge current
;                              passes the INA226 shunt → charge detected by
;                              sustained negative I.
;                       0 = LOAD install: charger is wired directly to the
;                              battery, bypassing the shunt → charge has to
;                              be inferred from voltage trend.
;   BAME_VMIN_UTILE   : optional override of the user low-V threshold (V).
;                       Defaults to BAME_CELLS × 3.00 if not set.
;   BAME_VMAX_UTILE   : optional override of the user high-V threshold (V).
;                       Defaults to BAME_CELLS × 3.40 if not set.
;
; Output: each env builds to .pio/build/<env-name>/firmware.hex — the env
; name encodes the config so you can ship multiple variants side by side.
; To add your own variant: copy one of the [env:*] blocks below, change the
; build_flags, and rename the env.
; ============================================================

[platformio]
default_envs = nano-bus-4s

[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200
lib_deps =
    Wire
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    robtillaart/INA226@^0.6.6

; --- Reusable hardware bases (not built directly) ---
[hw_nano]
board = nanoatmega328new
upload_protocol = arduino
board_flags = -DBAME_DEBUG=0 -DBAME_DEV=1 -flto

[hw_prod]
board = ATmega328PB
board_build.mcu = atmega328pb
board_build.f_cpu = 16000000L
upload_protocol = usbasp
upload_flags = -B 4
board_flags = -DBAME_DEBUG=0 -flto

; ============================================================
; Build envs — one per (hardware × wiring × cell count) combo
; ============================================================

; --- Nano (Arduino Nano, dev mode) ---
[env:nano-bus-4s]
extends = hw_nano
build_flags = ${hw_nano.board_flags} -DBAME_WIRING_BUS=1 -DBAME_CELLS=4

[env:nano-load-4s]
extends = hw_nano
build_flags = ${hw_nano.board_flags} -DBAME_WIRING_BUS=0 -DBAME_CELLS=4

[env:nano-bus-8s]
extends = hw_nano
build_flags = ${hw_nano.board_flags} -DBAME_WIRING_BUS=1 -DBAME_CELLS=8

; --- Prod (ATmega328PB, full menu) ---
[env:prod-bus-4s]
extends = hw_prod
build_flags = ${hw_prod.board_flags} -DBAME_WIRING_BUS=1 -DBAME_CELLS=4

[env:prod-load-4s]
extends = hw_prod
build_flags = ${hw_prod.board_flags} -DBAME_WIRING_BUS=0 -DBAME_CELLS=4

[env:prod-bus-8s]
extends = hw_prod
build_flags = ${hw_prod.board_flags} -DBAME_WIRING_BUS=1 -DBAME_CELLS=8
