; ===========================================
; BaMe Battery Meter - PlatformIO Config
; ===========================================

; --- Config partagee ---
[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200

lib_deps =
    Wire
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    robtillaart/INA226@^0.6.6

; --- Prototypage : Arduino Nano USB-C (ATmega328P) ---
; Dev build: no sleep, minimal menu (flash-constrained)
; Inject user range via -DBAME_VMIN_UTILE=12.0 -DBAME_VMAX_UTILE=13.6
[env:nano]
board = nanoatmega328new
upload_protocol = arduino
build_flags = -DBAME_DEBUG=0 -DBAME_DEV=1 -flto

; --- Production : USBasp + board compact ---
[env:prod]
board = ATmega328PB
board_build.mcu = atmega328pb
board_build.f_cpu = 16000000L
upload_protocol = usbasp
upload_flags = -B 4
build_flags = -DBAME_DEBUG=0 -flto
