name: Render OLED screenshots

on:
  workflow_dispatch:
  push:
    paths:
      - "sim/**"
      - ".github/workflows/render-screenshots.yml"

jobs:
  render-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install cairosvg

      - name: Render screenshots
        run: |
          mkdir -p docs/screenshots

          for screen in info_cal main_discharging main_charging main_blocked settings_menu; do
            python sim/render_screen.py sim/screens/${screen}.py \
              --format svg --out docs/screenshots/${screen}.svg --scale 6
            python sim/render_screen.py sim/screens/${screen}.py \
              --format png --out docs/screenshots/${screen}.png --scale 6
          done

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/screenshots
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore(screenshots): update rendered OLED screenshots"
          git push
