name: Render OLED screenshots

on:
  workflow_dispatch:
  push:
    paths:
      - "sim/**"
      - "sim/screens/**"
      - ".github/workflows/render-screenshots.yml"

jobs:
  render-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install cairosvg

      - name: Render screenshots
        run: |
          mkdir -p docs/screenshots
          python sim/render_screen.py sim/screens/info_cal.py --format svg --out docs/screenshots/info_cal.svg --scale 6
          python sim/render_screen.py sim/screens/info_cal.py --format png --out docs/screenshots/info_cal.png --scale 6

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/screenshots
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore(screenshots): update rendered OLED screenshots"
          git push
